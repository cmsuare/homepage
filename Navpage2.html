
<html lang="en">

<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <title>Infinite Loop Animation</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
    }

    .loop {
      width: 200px;
      height: 200px;
      position: relative;
    }

    .circle {
      width: 100px;
      height: 100px;
      border: 5px solid #00f7ff;
      border-radius: 50%;
      position: absolute;
      animation: rotate 2s linear infinite;
    }

    .circle:nth-child(2) {
      left: 50px;
      border-color: #ff00c8;
      animation-direction: reverse;
    }

    @keyframes rotate {
      0% {
        transform: rotate(0deg) translateX(50px) rotate(0deg);
      }
      100% {
        transform: rotate(360deg) translateX(50px) rotate(-360deg);
      }
    }
  </style>
</head>
<body>

  <div class="loop">
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

</body>
